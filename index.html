        function renderSites() {
            const container = document.getElementById('siteList');
            container.innerHTML = sites.map(site => `
                <div class="flex items-center gap-4 p-5 border-b hover:bg-gray-50">
                    <input type="checkbox" class="site-check w-5 h-5 accent-indigo-600" data-url="${site.url}">
                    <div class="flex-1">
                        <div class="font-semibold">${site.name}</div>
                        <div class="text-sm text-gray-500">${site.group}</div>
                    </div>
                    <span class="text-3xl">${site.country}</span>
                </div>
            `).join('');
        }

        function openSelected() {
            const checked = Array.from(document.querySelectorAll('.site-check:checked'));
            if (checked.length === 0) return alert('請勾選網站！');

            alert(`正在開啟 ${checked.length} 個網站，請耐心等待...`);

            checked.forEach((item, index) => {
                setTimeout(() => {
                    window.open(item.dataset.url, '_blank');
                }, index * 500);   // 500ms 延遲，較穩定
            });
        }

        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            document.querySelectorAll('.site-check').forEach(cb => cb.checked = checked);
        }

        window.onload = renderSites;
